<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>📈 Roboadvisor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --bg-card:   #16161e;
      --border:    #2a2a3a;
      --accent:    #10b981;
      --accent-dim:#059669;
      --text:      #f0f0f8;
      --muted:     #5a5a78;
      --secondary: #9090b0;
      --buy:       #10b981;
      --sell:      #ef4444;
      --hold:      #f59e0b;
      --radius:    14px;
    }

    html { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }
    body { min-height: 100vh; overflow-x: hidden; }

    /* ── Header ── */
    .lp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .lp-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .lp-logo-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), #34d399);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 16px rgba(16,185,129,0.3);
      flex-shrink: 0;
    }
    .lp-date {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Main layout ── */
    .lp-body {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Portfolio value hero ── */
    .hero {
      text-align: center;
      padding: 28px 0 8px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .hero.visible { opacity: 1; transform: translateY(0); }
    .hero-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .hero-value {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 40%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-change {
      font-size: 14px;
      font-weight: 600;
      margin-top: 6px;
    }
    .hero-change.up   { color: var(--buy); }
    .hero-change.down { color: var(--sell); }

    /* ── Performance chart card ── */
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease 0.2s, transform 0.6s ease 0.2s;
    }
    .chart-card.visible { opacity: 1; transform: translateY(0); }
    .chart-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .chart-wrap { height: 200px; position: relative; }

    /* ── Range chips ── */
    .range-row {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      justify-content: center;
    }
    .chip {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--secondary);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #000; }

    /* ── Section heading ── */
    .section-heading {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 0 2px;
    }

    /* ── Suggestion cards ── */
    .sug-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .sug-card.visible { opacity: 1; transform: translateY(0); }

    .sug-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .sug-ticker-block { flex: 1; min-width: 0; }
    .sug-ticker {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .sug-name {
      font-size: 11px;
      color: var(--secondary);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sug-rec-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }
    .rec-pill {
      font-size: 13px;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 999px;
      letter-spacing: 0.04em;
    }
    .rec-pill.BUY  { background: rgba(16,185,129,0.15); color: var(--buy);  border: 1px solid rgba(16,185,129,0.35); }
    .rec-pill.SELL { background: rgba(239,68,68,0.15);  color: var(--sell); border: 1px solid rgba(239,68,68,0.35); }
    .rec-pill.HOLD { background: rgba(245,158,11,0.15); color: var(--hold); border: 1px solid rgba(245,158,11,0.35); }
    .rec-conf {
      font-size: 9px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Rationale text ── */
    .sug-rationale {
      font-size: 13px;
      line-height: 1.65;
      color: var(--secondary);
    }

    /* ── Mini signal strip inside suggestion card ── */
    .sug-signals {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .sug-sig {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 4px 9px;
      min-width: 62px;
    }
    .sug-sig-label {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .sug-sig-val { font-size: 11px; font-weight: 700; }
    .sug-sig.buy  { border-color: rgba(16,185,129,0.4); }
    .sug-sig.buy  .sug-sig-val { color: var(--buy); }
    .sug-sig.sell { border-color: rgba(239,68,68,0.4); }
    .sug-sig.sell .sug-sig-val { color: var(--sell); }
    .sug-sig.hold { border-color: rgba(245,158,11,0.4); }
    .sug-sig.hold .sug-sig-val { color: var(--hold); }
    .sug-sig.neutral { border-color: var(--border); }
    .sug-sig.neutral .sug-sig-val { color: var(--secondary); }

    /* ── Date badge ── */
    .sug-date {
      font-size: 10px;
      color: var(--muted);
      margin-top: 10px;
      text-align: right;
    }

    /* ── CTA button ── */
    .cta-wrap {
      padding: 16px 0 8px;
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .cta-wrap.visible { opacity: 1; transform: translateY(0); }
    .cta-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 14px;
      letter-spacing: 0.03em;
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent), #34d399);
      border: none;
      border-radius: 12px;
      color: #000;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.2px;
      padding: 16px 28px;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(16,185,129,0.3);
      width: 100%;
      justify-content: center;
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(16,185,129,0.4); }
    .cta-btn:active { transform: translateY(0); }
    .cta-btn svg { flex-shrink: 0; }

    /* ── No data state ── */
    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .no-data h2 { font-size: 22px; color: var(--text); margin-bottom: 10px; }
    .no-data p  { font-size: 13px; line-height: 1.6; }

    /* ── Skeleton shimmer (while loading) ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, #1e1e2e 50%, var(--bg-card) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header class="lp-header">
  <div class="lp-logo">
    <div class="lp-logo-icon">📈</div>
    Roboadvisor
  </div>
  <div class="lp-date" id="lp-date">—</div>
</header>

<main class="lp-body" id="lp-body">
  <div class="no-data" id="lp-loading">
    <h2>Loading…</h2>
    <p>Fetching portfolio data</p>
  </div>
</main>

<script>
'use strict';

// ── helpers ────────────────────────────────────────────────────
function fmtEur(v) { return v != null ? '€' + Number(v).toFixed(2) : '—'; }
function fmtPct(v) { return v != null ? (v >= 0 ? '+' : '') + Number(v).toFixed(2) + '%' : '—'; }
function sigClass(s) {
  if (!s) return 'neutral';
  s = s.toUpperCase();
  return s === 'BUY' ? 'buy' : s === 'SELL' ? 'sell' : s === 'HOLD' ? 'hold' : 'neutral';
}
function recEmoji(s) {
  return s === 'BUY' ? '🟢' : s === 'SELL' ? '🔴' : '🟡';
}

// ── chart instance ─────────────────────────────────────────────
let perfChart = null;
let fullData  = null;
let activeRange = '3M';

function filterRange(series, range) {
  if (range === 'ALL') return series;
  const now = new Date();
  const cut = new Date(now);
  if (range === '1M') cut.setMonth(now.getMonth() - 1);
  if (range === '3M') cut.setMonth(now.getMonth() - 3);
  if (range === '6M') cut.setMonth(now.getMonth() - 6);
  const cutStr = cut.toISOString().slice(0, 10);
  return series.filter(d => d.date >= cutStr);
}

function buildPortfolioSeries(data) {
  const priceHistory = data.price_history || {};
  const portfolio    = data.portfolio    || [];
  if (!portfolio.length) return [];

  // Collect all dates across all tickers
  const dateSet = new Set();
  Object.values(priceHistory).forEach(rows => rows.forEach(r => dateSet.add(r.date)));
  const allDates = [...dateSet].sort();

  // Build per-ticker price maps
  const maps = {};
  portfolio.forEach(pos => {
    maps[pos.ticker] = new Map();
    (priceHistory[pos.ticker] || []).forEach(r => maps[pos.ticker].set(r.date, r.close));
  });

  // Forward-fill prices
  const lastKnown = {};
  return allDates.map(date => {
    let total = 0;
    let allPresent = true;
    portfolio.forEach(pos => {
      const p = maps[pos.ticker]?.get(date);
      if (p != null) { lastKnown[pos.ticker] = p; total += p * pos.shares; }
      else if (lastKnown[pos.ticker] != null) { total += lastKnown[pos.ticker] * pos.shares; }
      else { allPresent = false; }
    });
    return allPresent && total > 0 ? { date, value: total } : null;
  }).filter(Boolean);
}

function renderChart(series) {
  if (perfChart) { perfChart.destroy(); perfChart = null; }
  const canvas = document.getElementById('lp-perf-chart');
  if (!canvas || !series.length) return;

  const xyData = series.map(d => ({ x: d.date, y: d.value }));
  const ctx    = canvas.getContext('2d');
  const grad   = ctx.createLinearGradient(0, 0, 0, 200);
  grad.addColorStop(0, 'rgba(16,185,129,0.25)');
  grad.addColorStop(1, 'rgba(16,185,129,0.01)');

  perfChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        data: xyData,
        borderColor: '#10b981',
        borderWidth: 2.5,
        backgroundColor: grad,
        fill: true,
        tension: 0.35,
        pointRadius: 0,
        pointHoverRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 900, easing: 'easeInOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#16161e',
          borderColor: '#2a2a3a',
          borderWidth: 1,
          titleColor: '#9090b0',
          bodyColor: '#f0f0f8',
          bodyFont: { weight: '700' },
          callbacks: { label: c => '€' + (c.raw?.y ?? c.raw).toFixed(2) }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'month', tooltipFormat: 'yyyy-MM-dd', displayFormats: { month: 'MMM yy', week: 'MMM d' } },
          adapters: { date: {} },
          grid: { color: 'rgba(42,42,58,0.4)' },
          ticks: { color: '#5a5a78', font: { size: 10 }, maxTicksLimit: 5, maxRotation: 0 }
        },
        y: {
          grid: { color: 'rgba(42,42,58,0.4)' },
          ticks: { color: '#5a5a78', font: { size: 10 }, maxTicksLimit: 4, callback: v => '€' + v.toFixed(0) }
        }
      }
    }
  });
}

// ── animate-in on scroll ───────────────────────────────────────
function observeVisible() {
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.hero, .chart-card, .sug-card, .cta-wrap').forEach(el => io.observe(el));
}

// ── render landing page ────────────────────────────────────────
function renderLanding(data) {
  fullData = data;
  const portfolio    = data.portfolio    || [];
  const suggestions  = data.suggestions  || [];
  const meta         = data.meta         || {};

  // Update date badge
  const dateEl = document.getElementById('lp-date');
  if (dateEl && meta.generated_at) dateEl.textContent = meta.generated_at;

  // Compute current portfolio value
  let totalValue = 0;
  portfolio.forEach(pos => {
    const hist = (data.price_history || {})[pos.ticker] || [];
    if (hist.length) totalValue += hist[hist.length - 1].close * pos.shares;
  });

  // Compute return vs cost basis from executed trades
  const invested = (data.executed_trades || []).reduce((sum, t) => {
    if (!t.total_eur) return sum;
    return t.action?.toUpperCase() === 'BUY' ? sum + t.total_eur : sum - t.total_eur;
  }, 0);
  const returnPct = invested > 0 ? (totalValue - invested) / invested * 100 : null;

  // Get latest suggestion per ticker
  const latestBySug = {};
  suggestions.forEach(s => { latestBySug[s.ticker] = s; });

  // Build portfolio series
  const fullSeries = buildPortfolioSeries(data);
  const series3M   = filterRange(fullSeries, '3M');

  // ── HTML ──────────────────────────────────────────────────────
  const body = document.getElementById('lp-body');
  body.innerHTML = `
    <!-- Hero value -->
    <div class="hero" id="lp-hero">
      <div class="hero-label">Portfolio Value</div>
      <div class="hero-value">${fmtEur(totalValue)}</div>
      ${returnPct != null ? `<div class="hero-change ${returnPct >= 0 ? 'up' : 'down'}">${fmtPct(returnPct)} since first trade</div>` : ''}
    </div>

    <!-- Performance chart -->
    <div class="chart-card" id="lp-chart-card">
      <div class="chart-title">Portfolio Performance</div>
      <div class="chart-wrap">
        <canvas id="lp-perf-chart"></canvas>
      </div>
      <div class="range-row">
        <button class="chip${activeRange==='1M'?' active':''}" data-range="1M">1M</button>
        <button class="chip${activeRange==='3M'?' active':''}" data-range="3M">3M</button>
        <button class="chip${activeRange==='6M'?' active':''}" data-range="6M">6M</button>
        <button class="chip${activeRange==='ALL'?' active':''}" data-range="ALL">All</button>
      </div>
    </div>

    <!-- Daily analysis heading -->
    <div class="section-heading">Today's Analysis</div>

    <!-- One card per ticker suggestion -->
    ${Object.values(latestBySug).map((s, i) => {
      const pos     = portfolio.find(p => p.ticker === s.ticker) || {};
      const rec     = (s.llm_recommendation || '').toUpperCase();
      const conf    = s.llm_confidence || '';
      const yFilter = (s.quant_signal || '').toUpperCase();
      const yExp    = s.signal_expired || false;
      const macd    = (s.macd_signal || '').toUpperCase();
      const propFc5 = s.prophet_forecast_5d ?? s.arima_forecast_5d;
      const zScore  = s.zscore;

      return `
      <div class="sug-card" id="sug-${i}" style="transition-delay:${0.15 + i * 0.12}s">
        <div class="sug-header">
          <div class="sug-ticker-block">
            <div class="sug-ticker">${s.ticker}</div>
            <div class="sug-name" title="${pos.name || ''}">${pos.name || ''}</div>
          </div>
          <div class="sug-rec-badge">
            <div class="rec-pill ${rec || 'HOLD'}">${recEmoji(rec)} ${rec || 'HOLD'}</div>
            <div class="rec-conf">AI · ${conf || '—'}</div>
          </div>
        </div>

        <div class="sug-rationale">${s.llm_rationale || '—'}</div>

        <div class="sug-signals">
          ${yFilter ? `<div class="sug-sig ${sigClass(yFilter)}"><span class="sug-sig-label">Y%-Filter</span><span class="sug-sig-val">${yFilter}${yExp ? ' ⏱️' : ''}</span></div>` : ''}
          ${macd    ? `<div class="sug-sig ${sigClass(macd)}"><span class="sug-sig-label">MACD</span><span class="sug-sig-val">${macd}</span></div>` : ''}
          ${propFc5 != null ? `<div class="sug-sig neutral"><span class="sug-sig-label">Prophet +5d</span><span class="sug-sig-val">${fmtEur(propFc5)}</span></div>` : ''}
          ${zScore  != null ? `<div class="sug-sig ${zScore <= -1.5 ? 'buy' : zScore >= 1.5 ? 'sell' : 'hold'}"><span class="sug-sig-label">Z-Score</span><span class="sug-sig-val">${Number(zScore).toFixed(2)}</span></div>` : ''}
        </div>

        <div class="sug-date">📅 ${s.date || meta.generated_at || '—'}</div>
      </div>`;
    }).join('')}

    <!-- CTA -->
    <div class="cta-wrap" id="lp-cta">
      <div class="cta-label">Explore the full dashboard with charts, backtesting, and trade history</div>
      <a href="index.html" class="cta-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Full Dashboard
      </a>
    </div>
  `;

  // Render chart after DOM is painted
  requestAnimationFrame(() => {
    renderChart(series3M);

    // Wire up range buttons
    document.querySelectorAll('.chip[data-range]').forEach(btn => {
      btn.addEventListener('click', () => {
        activeRange = btn.dataset.range;
        document.querySelectorAll('.chip[data-range]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderChart(filterRange(fullSeries, activeRange));
      });
    });

    // Trigger scroll-based animations
    observeVisible();

    // Force-show hero immediately (it's above the fold)
    setTimeout(() => {
      document.querySelector('.hero')?.classList.add('visible');
      document.querySelector('.chart-card')?.classList.add('visible');
    }, 80);
  });
}

// ── Load data ──────────────────────────────────────────────────
function loadData() {
  const paths = ['./dashboard_data.json', '../dashboard/dashboard_data.json'];
  function tryNext(i) {
    if (i >= paths.length) {
      document.getElementById('lp-loading').innerHTML =
        '<h2>No data</h2><p>Run the pipeline first to generate dashboard_data.json</p>';
      return;
    }
    fetch(paths[i])
      .then(r => { if (!r.ok) throw 0; return r.json(); })
      .then(renderLanding)
      .catch(() => tryNext(i + 1));
  }
  tryNext(0);
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
